<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Semiconductor Market Calendar">
  <!-- 임시 아이콘 (placeholder). 교체 시 이 파일과 public/icon-192.png, public/icon-512.png 를 바꾸세요. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b0f17"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 칩 핀 -->
  <g fill="#3b82f6">
    <rect x="168" y="96"  width="22" height="40" rx="6"/>
    <rect x="245" y="96"  width="22" height="40" rx="6"/>
    <rect x="322" y="96"  width="22" height="40" rx="6"/>
    <rect x="168" y="376" width="22" height="40" rx="6"/>
    <rect x="245" y="376" width="22" height="40" rx="6"/>
    <rect x="322" y="376" width="22" height="40" rx="6"/>
    <rect x="96"  y="168" width="40" height="22" rx="6"/>
    <rect x="96"  y="245" width="40" height="22" rx="6"/>
    <rect x="96"  y="322" width="40" height="22" rx="6"/>
    <rect x="376" y="168" width="40" height="22" rx="6"/>
    <rect x="376" y="245" width="40" height="22" rx="6"/>
    <rect x="376" y="322" width="40" height="22" rx="6"/>
  </g>

  <!-- 칩 본체 -->
  <rect x="136" y="136" width="240" height="240" rx="40" fill="url(#chip)" stroke="#3b82f6" stroke-width="6"/>

  <!-- 상승 추세선 (마켓) -->
  <polyline points="172,316 224,260 268,288 340,196"
    fill="none" stroke="#22c55e" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="340" cy="196" r="14" fill="#22c55e"/>

  <!-- 그리드 점 -->
  <g fill="#334155">
    <circle cx="180" cy="356" r="5"/>
    <circle cx="332" cy="356" r="5"/>
  </g>
</svg>
